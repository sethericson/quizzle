<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0c0c0c;
      --fg: #e8e2d9;
      --muted: #4a4540;
      --accent: #c8a97a;
      --line: rgba(200, 169, 122, 0.15);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 100;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 99;
    }

    .grid-lines {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
      z-index: 0;
      animation: gridFade 3s ease forwards;
    }

    @keyframes gridFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .error-code {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(7rem, 20vw, 14rem);
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 1px var(--muted);
      letter-spacing: -0.03em;
      opacity: 0;
      animation: riseIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
      user-select: none;
      position: relative;
    }

    .error-code::after {
      content: '404';
      position: absolute;
      inset: 0;
      color: var(--fg);
      -webkit-text-stroke: 0;
      clip-path: inset(0 100% 0 0);
      animation: revealText 1.2s cubic-bezier(0.77, 0, 0.18, 1) 0.6s forwards;
    }

    @keyframes revealText {
      to { clip-path: inset(0 0% 0 0); }
    }

    .divider {
      width: 1px;
      height: 0;
      background: linear-gradient(to bottom, transparent, var(--accent), transparent);
      margin: 2rem auto;
      animation: growLine 0.8s ease 1s forwards;
    }

    @keyframes growLine {
      to { height: 60px; }
    }

    .headline {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: clamp(1.4rem, 3.5vw, 2.2rem);
      color: var(--fg);
      line-height: 1.3;
      opacity: 0;
      animation: riseIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) 1.2s forwards;
      max-width: 560px;
    }

    .subline {
      margin-top: 1rem;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      opacity: 0;
      animation: riseIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) 1.5s forwards;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      padding: 1.4rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--line);
      opacity: 0;
      animation: riseIn 0.8s ease 2s forwards;
    }

    .footer-meta {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .footer-link {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: gap 0.3s ease, opacity 0.3s ease;
    }

    .footer-link:hover {
      gap: 0.9rem;
      opacity: 0.8;
    }

    .footer-link::after {
      content: '→';
      display: inline-block;
      transition: transform 0.3s ease;
    }

    .footer-link:hover::after {
      transform: translateX(3px);
    }

    .cursor-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      margin-left: 4px;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="grid-lines"></div>

  <div class="container">
    <div class="error-code">404</div>
    <div class="divider"></div>
    <p class="headline">It doesn't seem we could locate what you're looking for<span class="cursor-dot"></span></p>
    <p class="subline">The page may have moved, expired, or never existed</p>
  </div>

  <footer>
    <span class="footer-meta">Error / Page not found</span>
    <a href="https://quizzle.ink/dashboard" class="footer-link">Find what you need</a>
  </footer>

</body>
</html>
