<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Road v1.0.2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Arial Rounded MT Bold', Arial, sans-serif; display: flex; align-items: center; justify-content: center; }
  #game-container {
    position: relative;
    width: 100%;
    max-width: calc(100vh * 16 / 9);
    height: 100%;
    max-height: calc(100vw * 9 / 16);
    overflow: hidden;
  }
  canvas { display: block; width: 100% !important; height: 100% !important; }

  #ui {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }

  #score-display {
    position: absolute; top: 30px; left: 50%;
    transform: translateX(-50%);
    font-size: 64px; font-weight: 900;
    color: white;
    text-shadow: 0 4px 0 #333, 0 0 20px rgba(0,0,0,0.5);
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
    letter-spacing: 2px;
  }

  #start-screen, #death-screen {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: all;
    background: rgba(0,0,0,0.45);
  }

  #death-screen { display: none; }

  .game-logo {
    font-size: 72px; font-weight: 900;
    color: #FFD700;
    text-shadow: 0 6px 0 #B8860B, 0 0 40px rgba(255,215,0,0.4);
    letter-spacing: 3px;
    margin-bottom: 10px;
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
  }

  .game-subtitle {
    font-size: 22px; color: #fff;
    margin-bottom: 50px;
    text-shadow: 0 2px 8px #000;
    letter-spacing: 1px;
  }

  .tap-btn {
    background: #FFD700;
    color: #333;
    border: none; border-radius: 50px;
    padding: 20px 60px;
    font-size: 28px; font-weight: 900;
    cursor: pointer;
    box-shadow: 0 8px 0 #B8860B, 0 12px 30px rgba(0,0,0,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .tap-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #B8860B; }

  #death-screen .game-logo { color: #FF4444; text-shadow: 0 6px 0 #8B0000, 0 0 40px rgba(255,68,68,0.4); }

  #final-score {
    font-size: 36px; color: white;
    margin-bottom: 10px;
    text-shadow: 0 3px 0 #333;
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
  }
  #best-score {
    font-size: 22px; color: #FFD700;
    margin-bottom: 40px;
    text-shadow: 0 2px 0 #B8860B;
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
  }

  #coin-display {
    position: absolute; top: 30px; right: 30px;
    display: flex; align-items: center; gap: 10px;
    font-size: 28px; font-weight: 900; color: #FFD700;
    text-shadow: 0 3px 0 #B8860B;
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
  }

  .coin-icon {
    width: 32px; height: 32px;
    background: radial-gradient(circle at 35% 35%, #FFE066, #FFD700, #B8860B);
    border-radius: 50%;
    box-shadow: 0 3px 0 #8B6914, inset 0 -2px 4px rgba(0,0,0,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  #eagle-warning {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px; font-weight: 900;
    color: #FF6600;
    text-shadow: 0 4px 0 #8B3500;
    display: none;
    animation: eaglePulse 0.3s infinite alternate;
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
  }
  @keyframes eaglePulse { from { transform: translate(-50%,-50%) scale(1); } to { transform: translate(-50%,-50%) scale(1.1); } }

  #mobile-controls {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 200px;
    display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr;
    pointer-events: all; z-index: 20; opacity: 0;
  }
  #mobile-controls button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: white; font-size: 32px;
    cursor: pointer; border-radius: 8px;
  }
  #mobile-controls button:active { background: rgba(255,255,255,0.2); }
  #btn-forward { grid-column: 2; grid-row: 1; }
  #btn-left { grid-column: 1; grid-row: 2; }
  #btn-back { grid-column: 2; grid-row: 2; }
  #btn-right { grid-column: 3; grid-row: 2; }


</style>
</head>
<body>
<div id="game-container">
<div id="ui">
  <div id="score-display" style="display:none;">0</div>
  <div id="coin-display" style="display:none;"><div class="coin-icon">●</div><span id="coin-count">0</span></div>
  <div id="eagle-warning">🦅 EAGLE!</div>

  <div id="start-screen">
    <div class="game-logo">FLAPPY ROAD</div>
    <div class="game-subtitle">How far can you go?</div>
    <button class="tap-btn" onclick="sndTap(); startGame()">TAP TO PLAY</button>
  </div>

  <div id="death-screen">
    <div class="game-logo">GAME OVER</div>
    <div id="final-score">Score: 0</div>
    <div id="best-score">Best: 0</div>
    <button class="tap-btn" onclick="sndTap(); restartGame()">PLAY AGAIN</button>
  </div>
</div>

<div id="mobile-controls">
  <button id="btn-forward" ontouchstart="handleMove('forward')">▲</button>
  <button id="btn-left" ontouchstart="handleMove('left')">◀</button>
  <button id="btn-back" ontouchstart="handleMove('back')">▼</button>
  <button id="btn-right" ontouchstart="handleMove('right')">▶</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─────────────────────────────────────────────
// SCENE SETUP
// ─────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 30, 80);

const container = document.getElementById('game-container');

function getContainerSize() {
  const w = container.clientWidth || window.innerWidth;
  const h = container.clientHeight || window.innerHeight;
  return { w, h };
}

const renderer = new THREE.WebGLRenderer({ antialias: true });
const initSize = getContainerSize();
renderer.setSize(initSize.w, initSize.h);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// Camera — isometric-ish like real Crossy Road
const camera = new THREE.PerspectiveCamera(45, 16 / 9, 0.1, 200);
camera.position.set(0, 14, 16);
camera.lookAt(0, 0, 0);

// Lighting
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfffe8c, 1.2);
sun.position.set(10, 20, 10);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 100;
sun.shadow.camera.left = -40;
sun.shadow.camera.right = 40;
sun.shadow.camera.top = 40;
sun.shadow.camera.bottom = -40;
scene.add(sun);

const fill = new THREE.DirectionalLight(0xadd8ff, 0.4);
fill.position.set(-10, 10, -10);
scene.add(fill);

// ─────────────────────────────────────────────
// SOUND ENGINE — Web Audio API
// ─────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, type, duration, vol, attack, decay, freqEnd) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    if (freqEnd !== undefined) osc.frequency.exponentialRampToValueAtTime(freqEnd, ctx.currentTime + duration);
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + (attack || 0.01));
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration + 0.05);
  } catch(e) {}
}

function playNoise(duration, vol, filterFreq, attack) {
  try {
    const ctx = getAudio();
    const bufSize = ctx.sampleRate * duration;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = filterFreq || 400;
    filter.Q.value = 1.5;
    const gain = ctx.createGain();
    src.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + (attack || 0.01));
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
    src.start(ctx.currentTime);
  } catch(e) {}
}

// HOP — soft boing, slightly pitched
function sndHop() {
  playTone(320, 'sine', 0.12, 0.25, 0.005, 0.1, 180);
  playTone(640, 'sine', 0.07, 0.08, 0.005, 0.06, 400);
}

// LAND — soft thud on landing
function sndLand() {
  playNoise(0.07, 0.18, 200, 0.005);
  playTone(90, 'sine', 0.08, 0.12, 0.003, 0.07);
}

// COIN — bright ding
function sndCoin() {
  playTone(1200, 'sine', 0.18, 0.3, 0.005, 0.15, 1600);
  playTone(1600, 'sine', 0.12, 0.15, 0.005, 0.1, 2000);
}

// CAR WHOOSH — low rumble whoosh as car passes nearby
function sndCarPass() {
  try {
    const ctx = getAudio();
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.3, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(800, ctx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.3);
    const gain = ctx.createGain();
    src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.3);
    src.start();
  } catch(e) {}
}

// SPLASH — water death
function sndSplash() {
  playNoise(0.35, 0.5, 800, 0.005);
  playNoise(0.5, 0.3, 300, 0.02);
  playTone(180, 'sine', 0.25, 0.2, 0.005, 0.2, 60);
}

// SQUISH — car/train hit death
function sndSquish() {
  playNoise(0.2, 0.6, 600, 0.003);
  playTone(120, 'sawtooth', 0.2, 0.3, 0.003, 0.15, 40);
  playNoise(0.3, 0.3, 150, 0.01);
}

// EAGLE SCREECH
function sndEagleScreech() {
  playTone(900, 'sawtooth', 0.4, 0.3, 0.01, 0.35, 400);
  playTone(1100, 'sawtooth', 0.25, 0.15, 0.02, 0.2, 600);
}

// EAGLE SWOOP — whoosh as eagle comes down
function sndEagleSwoop() {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(600, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.6);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.6);
    osc.start(); osc.stop(ctx.currentTime + 0.65);
  } catch(e) {}
}

// TRAIN HORN — classic two-tone train horn, longer with volume based on distance
function sndTrainHorn(vol) {
  const v = (vol !== undefined ? vol : 0.32) * 0.65; // quieter overall
  try {
    const ctx = getAudio();
    const t = ctx.currentTime;
    const playHornAt = (startT, dur) => {
      [233, 311, 185].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        const vols = [v, v * 0.65, v * 0.5];
        const fadeIn = Math.min(0.18, dur * 0.25);
        const fadeOut = Math.min(0.28, dur * 0.35);
        gain.gain.setValueAtTime(0.0001, startT);
        gain.gain.exponentialRampToValueAtTime(vols[i], startT + fadeIn);
        gain.gain.setValueAtTime(vols[i], startT + dur - fadeOut);
        gain.gain.exponentialRampToValueAtTime(0.0001, startT + dur);
        osc.start(startT);
        osc.stop(startT + dur + 0.05);
      });
    };
    playHornAt(t, 0.9);
    playHornAt(t + 1.05, 0.5);
    playHornAt(t + 1.7, 1.2);
  } catch(e) {}
}

// TRAIN RUMBLE — continuous low rumble while train is near
let trainRumbleNode = null;
function sndTrainRumbleStart() {
  try {
    if (trainRumbleNode) return;
    const ctx = getAudio();
    const buf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.loop = true;
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 120;
    const gain = ctx.createGain();
    src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.22, ctx.currentTime);
    src.start();
    trainRumbleNode = { src, gain };
  } catch(e) {}
}

function sndTrainRumbleStop() {
  try {
    if (!trainRumbleNode) return;
    const ctx = getAudio();
    trainRumbleNode.gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.3);
    setTimeout(() => {
      try { trainRumbleNode.src.stop(); } catch(e) {}
      trainRumbleNode = null;
    }, 350);
  } catch(e) {}
}

// HIGH SCORE MILESTONE — triumphant ding sequence
function sndHighScore() {
  [0, 0.12, 0.24].forEach((t, i) => {
    setTimeout(() => {
      playTone([523, 659, 784][i], 'sine', 0.2, 0.35, 0.01, 0.18);
    }, t * 1000);
  });
}

// BUTTON TAP
function sndTap() {
  playTone(440, 'sine', 0.06, 0.2, 0.003, 0.05, 500);
}

// ─────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────
let score = 0, bestScore = 0, coins = 0;
let gameRunning = false;
let playerRow = 0;
let playerCol = 0;
let maxRow = 0;
let eagleTimer = 0;
let eagleActive = false;
let eagleMesh = null;
let deathAnimating = false;
let animating = false;

// ─────────────────────────────────────────────
// LANE SYSTEM
// ─────────────────────────────────────────────
const LANE_WIDTH = 2.2;
const CELL_SIZE = 2.2;
const VISIBLE_LANES = 30;
const SAFE_LANES_BEHIND = 5;

const LANE_TYPES = ['grass','grass','road','road','road','river','river','grass','road','road','road','grass','river','river','road','grass'];

let lanes = [];
let laneObjects = [];

// ─────────────────────────────────────────────
// MATERIALS
// ─────────────────────────────────────────────
const mats = {
  grassLight: new THREE.MeshLambertMaterial({ color: 0x7EC850 }),
  grassDark:  new THREE.MeshLambertMaterial({ color: 0x6BBF40 }),
  road:       new THREE.MeshLambertMaterial({ color: 0x555566 }),
  roadLine:   new THREE.MeshLambertMaterial({ color: 0xFFFFAA }),
  water:      new THREE.MeshLambertMaterial({ color: 0x3B9FD1, transparent: true, opacity: 0.85 }),
  waterDark:  new THREE.MeshLambertMaterial({ color: 0x2B8FC1, transparent: true, opacity: 0.85 }),
  log:        new THREE.MeshLambertMaterial({ color: 0x8B6340 }),
  logEnd:     new THREE.MeshLambertMaterial({ color: 0x6B4520 }),
  carRed:     new THREE.MeshLambertMaterial({ color: 0xE63030 }),
  carBlue:    new THREE.MeshLambertMaterial({ color: 0x3060E6 }),
  carYellow:  new THREE.MeshLambertMaterial({ color: 0xE6C030 }),
  carGreen:   new THREE.MeshLambertMaterial({ color: 0x30A640 }),
  carWhite:   new THREE.MeshLambertMaterial({ color: 0xEEEEEE }),
  carWindow:  new THREE.MeshLambertMaterial({ color: 0x88CCFF, transparent: true, opacity: 0.7 }),
  carWheel:   new THREE.MeshLambertMaterial({ color: 0x222222 }),
  trainBody:  new THREE.MeshLambertMaterial({ color: 0xCC3333 }),
  trainGrey:  new THREE.MeshLambertMaterial({ color: 0x888888 }),
  trackBed:   new THREE.MeshLambertMaterial({ color: 0x8B7355 }),
  trackRail:  new THREE.MeshLambertMaterial({ color: 0x999999 }),
  chickBody:  new THREE.MeshLambertMaterial({ color: 0xF5E642 }),
  chickBeak:  new THREE.MeshLambertMaterial({ color: 0xFF8800 }),
  chickEye:   new THREE.MeshLambertMaterial({ color: 0x111111 }),
  chickComb:  new THREE.MeshLambertMaterial({ color: 0xFF3333 }),
  chickWing:  new THREE.MeshLambertMaterial({ color: 0xE5D030 }),
  chickFoot:  new THREE.MeshLambertMaterial({ color: 0xFF8800 }),
  coin:       new THREE.MeshLambertMaterial({ color: 0xFFD700, emissive: 0xFFAA00, emissiveIntensity: 0.3 }),
  treeLeaf:   new THREE.MeshLambertMaterial({ color: 0x3A8C30 }),
  treeTrunk:  new THREE.MeshLambertMaterial({ color: 0x6B4020 }),
  bush:       new THREE.MeshLambertMaterial({ color: 0x4CAF30 }),
  rockMat:    new THREE.MeshLambertMaterial({ color: 0xAAAAAA }),
  lilypad:    new THREE.MeshLambertMaterial({ color: 0x2E8B20 }),
  trainTrack: new THREE.MeshLambertMaterial({ color: 0x333333 }),
};

// ─────────────────────────────────────────────
// GEOMETRY HELPERS
// ─────────────────────────────────────────────
function box(w, h, d, mat, rx=0, ry=0, rz=0) {
  const g = new THREE.BoxGeometry(w, h, d);
  const m = new THREE.Mesh(g, mat);
  m.rotation.set(rx, ry, rz);
  m.castShadow = true;
  m.receiveShadow = true;
  return m;
}

function group() { return new THREE.Group(); }

// ─────────────────────────────────────────────
// CHARACTER — Voxel Chicken
// ─────────────────────────────────────────────
function makeChicken() {
  const g = group();

  // Body
  const body = box(0.9, 0.85, 0.75, mats.chickBody);
  body.position.set(0, 0.42, 0);
  g.add(body);

  // Head
  const head = box(0.7, 0.65, 0.65, mats.chickBody);
  head.position.set(0, 1.1, 0.1);
  g.add(head);

  // Beak
  const beak = box(0.22, 0.14, 0.22, mats.chickBeak);
  beak.position.set(0, 1.08, 0.48);
  g.add(beak);

  // Eyes
  const eyeL = box(0.12, 0.12, 0.1, mats.chickEye);
  eyeL.position.set(-0.2, 1.18, 0.38);
  g.add(eyeL);
  const eyeR = eyeL.clone();
  eyeR.position.set(0.2, 1.18, 0.38);
  g.add(eyeR);

  // Comb
  const comb1 = box(0.16, 0.22, 0.14, mats.chickComb);
  comb1.position.set(0, 1.54, 0.05);
  g.add(comb1);
  const comb2 = box(0.12, 0.16, 0.12, mats.chickComb);
  comb2.position.set(-0.16, 1.5, 0.08);
  g.add(comb2);
  const comb3 = comb2.clone();
  comb3.position.set(0.16, 1.5, 0.08);
  g.add(comb3);

  // Wings
  const wingL = box(0.18, 0.45, 0.55, mats.chickWing);
  wingL.position.set(-0.55, 0.42, 0);
  g.add(wingL);
  const wingR = wingL.clone();
  wingR.position.set(0.55, 0.42, 0);
  g.add(wingR);

  // Tail
  const tail = box(0.3, 0.3, 0.2, mats.chickWing);
  tail.position.set(0, 0.65, -0.45);
  tail.rotation.x = 0.4;
  g.add(tail);

  // Feet
  const footL = box(0.2, 0.1, 0.35, mats.chickFoot);
  footL.position.set(-0.22, 0.05, 0.12);
  g.add(footL);
  const footR = footL.clone();
  footR.position.set(0.22, 0.05, 0.12);
  g.add(footR);

  g.castShadow = true;
  return g;
}

// ─────────────────────────────────────────────
// CAR (voxel style)
// ─────────────────────────────────────────────
const carColors = [mats.carRed, mats.carBlue, mats.carYellow, mats.carGreen, mats.carWhite];
function makeCar(colorIdx) {
  const g = group();
  const bodyMat = carColors[colorIdx % carColors.length];

  // Main body
  const chassis = box(1.6, 0.55, 3.2, bodyMat);
  chassis.position.set(0, 0.42, 0);
  chassis.userData.isBody = true;
  g.add(chassis);

  // Cab
  const cab = box(1.3, 0.55, 1.8, bodyMat);
  cab.position.set(0, 0.97, -0.1);
  cab.userData.isBody = true;
  g.add(cab);

  // Windows front
  const wFront = box(1.1, 0.38, 0.08, mats.carWindow);
  wFront.position.set(0, 1.0, 0.83);
  g.add(wFront);

  // Windows back
  const wBack = wFront.clone();
  wBack.position.set(0, 1.0, -0.93);
  g.add(wBack);

  // Side windows
  const wSideL = box(0.08, 0.32, 1.2, mats.carWindow);
  wSideL.position.set(-0.67, 1.0, -0.1);
  g.add(wSideL);
  const wSideR = wSideL.clone();
  wSideR.position.set(0.67, 1.0, -0.1);
  g.add(wSideR);

  // Wheels

const trainBlueMat  = new THREE.MeshLambertMaterial({ color: 0x1A3A8C });
const trainBlue2Mat = new THREE.MeshLambertMaterial({ color: 0x0F2266 });
const trainYellowMat= new THREE.MeshLambertMaterial({ color: 0xFFCD00 });
const trainWindowMat= new THREE.MeshLambertMaterial({ color: 0xAADDFF, transparent: true, opacity: 0.8 });
const trainWhiteMat = new THREE.MeshLambertMaterial({ color: 0xEEEEEE });

function makeTrainCar(isLoco, facingDir) {
  // Each car: 1.8w x 1.6h x 4.0d (local Z = long axis, rotated PI/2 in world later)
  const g = group();
  const W = 1.8, H = 1.55, D = 4.0;

  // Main body — dark blue
  const body = box(W, H, D, trainBlueMat);
  body.position.set(0, H/2 + 0.2, 0);
  body.userData.isBody = true;
  g.add(body);

  // Yellow stripe along bottom
  const stripe = box(W + 0.02, 0.28, D + 0.02, trainYellowMat);
  stripe.position.set(0, 0.34, 0);
  stripe.userData.isBody = true;
  g.add(stripe);

  // Windows row — 3 windows per visible side
  const winH = 0.38, winW = 0.55, winD = 0.08;
  for (let wi = -1; wi <= 1; wi++) {
    const winL = box(winD, winH, winW, trainWindowMat);
    winL.position.set(-(W/2 + 0.01), H/2 + 0.05 + 0.2, wi * 1.15);
    g.add(winL);
    const winR = winL.clone();
    winR.position.set(W/2 + 0.01, H/2 + 0.05 + 0.2, wi * 1.15);
    g.add(winR);
  }

  if (isLoco) {
    // Front nose — lighter blue wedge
    const nose = box(W, H * 0.85, 0.7, trainWhiteMat);
    nose.position.set(0, H/2 * 0.85 + 0.2, facingDir > 0 ? D/2 + 0.35 : -(D/2 + 0.35));
    g.add(nose);
    // Headlights
    const hlMat = new THREE.MeshLambertMaterial({ color: 0xFFFFCC, emissive: new THREE.Color(0xFFFF88), emissiveIntensity: 0.6 });
    [-0.5, 0.5].forEach(sx => {
      const hl = box(0.22, 0.22, 0.12, hlMat);
      hl.position.set(sx, H * 0.55 + 0.2, facingDir > 0 ? D/2 + 0.72 : -(D/2 + 0.72));
      g.add(hl);
    });
  }

  // Wheels
  [-1.4, 1.4].forEach(wz => {
    [-0.98, 0.98].forEach(wx => {
      const w = box(0.28, 0.38, 0.38, mats.carWheel);
      w.position.set(wx, 0.19, wz);
      g.add(w);
    });
  });

  // Connector bar between cars
  const conn = box(0.18, 0.18, 0.35, mats.trainGrey);
  conn.position.set(0, 0.45, D/2 + 0.18);
  g.add(conn);

  return g;
}

// Build a full train: 1 loco + N passenger cars, all as one group
function makeTrain(numCars, dir) {
  const g = group();
  const CAR_LEN = 4.0;
  const GAP = 0.25;
  const totalCars = numCars || 5;

  for (let i = 0; i < totalCars; i++) {
    const isLoco = i === 0;
    const car = makeTrainCar(isLoco, dir);
    // Place cars along local Z (will be rotated PI/2 in world, so Z→X)
    // Loco at front (positive Z if dir=+1)
    const offset = -(i * (CAR_LEN + GAP));
    car.position.set(0, 0, offset);
    g.add(car);
  }

  // Total hitbox width = numCars * (CAR_LEN + GAP)
  g.userData.trainLength = totalCars * (CAR_LEN + GAP);
  return g;
}

// ─────────────────────────────────────────────
// LANE FLOOR TILES
// ─────────────────────────────────────────────
const COLS = 10; // columns each side

function buildLaneTile(laneType, laneIndex) {
  const g = group();
  const z = -laneIndex * LANE_WIDTH;
  const isAlternate = laneIndex % 2 === 0;

  if (laneType === 'grass') {
    const grassMat = isAlternate ? mats.grassLight : mats.grassDark;
    for (let c = -COLS; c <= COLS; c++) {
      const tile = box(CELL_SIZE - 0.04, 0.3, CELL_SIZE - 0.04, grassMat);
      tile.position.set(c * CELL_SIZE, 0, z);
      tile.receiveShadow = true;
      g.add(tile);
    }

    // Decorations
    const decCount = Math.floor(Math.random() * 4) + 1;
    const usedCols = new Set();
    usedCols.add(0); // don't block center
    for (let d = 0; d < decCount; d++) {
      let c;
      do { c = Math.floor(Math.random() * (COLS * 2 + 1)) - COLS; } while (usedCols.has(c));
      usedCols.add(c);
      const roll = Math.random();
      let dec;
      if (roll < 0.5) { dec = makeTree(); dec.userData.isTree = true; }
      else if (roll < 0.8) dec = makeBush();
      else dec = makeRock();
      dec.position.set(c * CELL_SIZE, 0.3, z);
      dec.userData.decCol = c;
      g.add(dec);
      // Return decoration X positions so laneData can store them for collision
      if (!g.userData.decPositions) g.userData.decPositions = [];
      g.userData.decPositions.push(c * CELL_SIZE);
    }

  } else if (laneType === 'road') {
    // Road base
    const road = box((COLS * 2 + 1) * CELL_SIZE, 0.22, CELL_SIZE - 0.05, mats.road);
    road.position.set(0, 0, z);
    road.receiveShadow = true;
    g.add(road);

    // Dashed center line
    for (let c = -COLS; c <= COLS; c++) {
      if (c % 2 === 0) {
        const line = box(0.12, 0.24, 0.9, mats.roadLine);
        line.position.set(c * CELL_SIZE, 0, z);
        g.add(line);
      }
    }

    // Road edge lines
    const edgeL = box((COLS * 2 + 1) * CELL_SIZE, 0.24, 0.1, new THREE.MeshLambertMaterial({ color: 0xFFFFDD }));
    edgeL.position.set(0, 0, z + CELL_SIZE/2 - 0.05);
    g.add(edgeL);
    const edgeR = edgeL.clone();
    edgeR.position.set(0, 0, z - CELL_SIZE/2 + 0.05);
    g.add(edgeR);

  } else if (laneType === 'river') {
    const riverMat = isAlternate ? mats.water : mats.waterDark;
    const water = box((COLS * 2 + 1) * CELL_SIZE, 0.18, CELL_SIZE - 0.05, riverMat);
    water.position.set(0, 0, z);
    water.receiveShadow = true;
    g.add(water);

  } else if (laneType === 'train') {
    // Track bed
    const bed = box((COLS * 2 + 1) * CELL_SIZE, 0.22, CELL_SIZE - 0.05, mats.trackBed);
    bed.position.set(0, 0, z);
    bed.receiveShadow = true;
    g.add(bed);

    // Rails
    for (let side of [-0.4, 0.4]) {
      const rail = box((COLS * 2 + 1) * CELL_SIZE, 0.14, 0.14, mats.trackRail);
      rail.position.set(0, 0.18, z + side);
      g.add(rail);
    }

    // Ties
    for (let c = -COLS; c <= COLS; c++) {
      const tie = box(1.4, 0.12, 0.95, mats.trackBed);
      tie.position.set(c * CELL_SIZE, 0.12, z);
      g.add(tie);
    }

    // Warning light posts — placed every ~6 cells
    const lightMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
    const lightOffMat = new THREE.MeshLambertMaterial({ color: 0x330000 });
    const warnLights = [];
    for (let c = -COLS + 1; c <= COLS - 1; c += 6) {
      const post = box(0.12, 1.2, 0.12, lightMat);
      post.position.set(c * CELL_SIZE, 0.6, z + CELL_SIZE * 0.55);
      g.add(post);
      const bulb = box(0.28, 0.28, 0.28, lightOffMat.clone());
      bulb.position.set(c * CELL_SIZE, 1.32, z + CELL_SIZE * 0.55);
      g.add(bulb);
      warnLights.push(bulb);
    }
    g.userData.warnLights = warnLights;
  }

  return g;
}

// ─────────────────────────────────────────────
// LANE DATA + OBSTACLES
// ─────────────────────────────────────────────
let obstaclePool = [];

function getLaneType(index) {
  if (index < 0) return 'grass';
  if (index === 0) return 'grass';
  // Use the precomputed sequence stored in laneTypeSequence
  return laneTypeSequence[index] || 'grass';
}

// Weighted random: pick number of consecutive train lanes (1–6, 1&2 most common)
function pickTrainCount() {
  const r = Math.random();
  if (r < 0.38) return 1;
  if (r < 0.65) return 2;
  if (r < 0.80) return 3;
  if (r < 0.90) return 4;
  if (r < 0.96) return 5;
  return 6;
}

// Pre-generate a long sequence of lane types so we can look up by index
let laneTypeSequence = ['grass'];

function buildLaneSequence() {
  laneTypeSequence = ['grass'];
  let i = 1;
  while (i < 600) {
    const r = Math.random();
    let chosen;
    if (r < 0.30) chosen = ['road','road','road'];
    else if (r < 0.45) chosen = ['road','road'];
    else if (r < 0.55) chosen = ['river','river'];
    else if (r < 0.62) chosen = ['river'];
    else if (r < 0.75) { const n = pickTrainCount(); chosen = Array(n).fill('train'); }
    else chosen = ['grass'];
    chosen.forEach(t => { laneTypeSequence[i++] = t; });
    laneTypeSequence[i++] = 'grass';
  }
}
buildLaneSequence(); // build initial sequence on load

function buildLane(index) {
  const type = getLaneType(index);
  const tile = buildLaneTile(type, index);
  scene.add(tile);

  const laneData = { index, type, tile, obstacles: [], speed: 0, direction: 1, coins: [], decorations: [] };

  // Pull decoration positions from tile userData (set during buildLaneTile for grass)
  if (tile.userData.decPositions) {
    tile.userData.decPositions.forEach(x => laneData.decorations.push({ x }));
  }

  // Store warning lights reference for train lanes
  if (tile.userData.warnLights) {
    laneData.warnLights = tile.userData.warnLights;
  }

  const z = -index * LANE_WIDTH;

  if (type === 'road' && index > 0) {
    const dir = Math.random() > 0.5 ? 1 : -1;
    const spd = 2 + Math.random() * 4 + Math.min(index * 0.05, 4);
    laneData.direction = dir;
    laneData.speed = spd;

    const count = Math.floor(1 + Math.random() * 3);
    const spacing = (COLS * 2 * CELL_SIZE) / count;
    for (let i = 0; i < count; i++) {
      const roll = Math.random();
      const car = roll < 0.7 ? makeCar(Math.floor(Math.random()*5)) : makeTruck(Math.floor(Math.random()*5));
      const startX = -COLS * CELL_SIZE + i * spacing + (Math.random() - 0.5) * spacing * 0.5;
      car.position.set(startX, 0.0, z);
      // Cars/trucks travel along X axis. headlights face +Z local, so rotate to align with travel dir.
      // dir=+1 means moving in +X, so front should point +X => rotation.y = -PI/2
      // dir=-1 means moving in -X, so front should point -X => rotation.y = PI/2
      // Car body is long along local Z, headlights at +Z = front.
      // To face/travel in world +X: rotate Y = PI/2 (turns +Z local → +X world)
      // To face/travel in world -X: rotate Y = -PI/2
      car.rotation.y = dir > 0 ? Math.PI / 2 : -Math.PI / 2;
      scene.add(car);
      laneData.obstacles.push({ mesh: car, x: startX, type: 'car', width: roll < 0.7 ? 3.2 : 5.0 });
      // Apply Ishaan retroactively if easter egg is already active
      if (ishaanActive) applyIshaanToCar(car);
    }
  }

  if (type === 'river' && index > 0) {
    const dir = Math.random() > 0.5 ? 1 : -1;
    const spd = 1.5 + Math.random() * 2;
    laneData.direction = dir;
    laneData.speed = spd;

    const count = 3 + Math.floor(Math.random() * 3);
    const spacing = (COLS * 2 * CELL_SIZE) / count;
    for (let i = 0; i < count; i++) {
      const len = 2.2 + Math.random() * 2.5;
      const log = makeLog(len * CELL_SIZE * 0.5);
      const startX = -COLS * CELL_SIZE + i * spacing;
      log.position.set(startX, 0.1, z);
      scene.add(log);
      laneData.obstacles.push({ mesh: log, x: startX, type: 'log', width: len * CELL_SIZE * 0.5 });
    }
  }

  if (type === 'train' && index > 0) {
    const dir = Math.random() > 0.5 ? 1 : -1;
    laneData.direction = dir;
    // Real Crossy Road trains are very fast — roughly 3-4x car speed
    laneData.speed = 28 + Math.random() * 10;

    const numCars = 4 + Math.floor(Math.random() * 3); // 4–6 cars
    const train = makeTrain(numCars, dir);
    const trainLen = train.userData.trainLength;

    // Start fully off-screen
    const startX = dir > 0 ? -(COLS * CELL_SIZE + trainLen) : (COLS * CELL_SIZE + trainLen);
    train.position.set(startX, 0.0, z);
    train.rotation.y = dir > 0 ? Math.PI / 2 : -Math.PI / 2;
    scene.add(train);

    laneData.obstacles.push({ mesh: train, x: startX, type: 'train', width: trainLen });
    laneData.trainTimer = 4 + Math.random() * 7;
    laneData.trainActive = false;
    laneData.trainLen = trainLen;
    laneData.numCars = numCars;

    // Apply Ishaan retroactively if easter egg is already active
    if (ishaanActive) applyIshaanToTrain(train);

    // Check if previous lane was also a train — sync them to fire together
    const prevLane = lanes.find(l => l.index === index - 1);
    if (prevLane && prevLane.type === 'train') {
      laneData.syncWith = index - 1;
    }
  }

  // Scatter some coins on safe lanes
  if ((type === 'grass' || type === 'road') && index > 0) {
    const coinCount = Math.random() > 0.6 ? Math.floor(Math.random() * 3) + 1 : 0;
    let attempts = 0;
    let placed = 0;
    while (placed < coinCount && attempts < 40) {
      attempts++;
      const cx = (Math.floor(Math.random() * (COLS * 2 + 1)) - COLS) * CELL_SIZE;

      // Only block coins inside grass decorations (trees, bushes, rocks)
      const blockedByDec = laneData.decorations.some(d => Math.abs(d.x - cx) < 1.0);

      if (blockedByDec) continue;

      const coin = makeCoin();
      coin.position.set(cx, 0.7, z);
      scene.add(coin);
      laneData.coins.push({ mesh: coin, x: cx, collected: false });
      placed++;
    }
  }

  lanes.push(laneData);
}

// GAME INIT
// ─────────────────────────────────────────────
function initWorld() {
  // Regenerate map sequence for each new game
  buildLaneSequence();

  // Clear old
  lanes.forEach(l => {
    scene.remove(l.tile);
    l.obstacles.forEach(o => scene.remove(o.mesh));
    l.coins.forEach(c => scene.remove(c.mesh));
  });
  lanes = [];

  for (let i = -SAFE_LANES_BEHIND; i < VISIBLE_LANES; i++) {
    buildLane(i);
  }
}

  mats.chickFoot.color.setHex(0xFF8800);
  mats.chickComb.color.setHex(0xFF3333);
  mats.chickEye.color.setHex(0x111111);

  sndTrainRumbleStop();
  initWorld();
  initPlayer();
  gameRunning = true;
}

function restartGame() {
  document.getElementById('death-screen').style.display = 'none';
  startGame();
}

// ─────────────────────────────────────────────
// MOVEMENT
// ─────────────────────────────────────────────
let onLog = false;
let logVelocityX = 0;
let deathQueued = false;

function handleMove(dir) {
  if (!gameRunning || animating || deathAnimating) return;

  let newRow = playerRow;
  let newCol = playerCol;

  if (dir === 'forward') { newRow++; }
  else if (dir === 'back') { newRow = Math.max(0, newRow - 1); }
  else if (dir === 'left') { newCol--; }
  else if (dir === 'right') { newCol++; }

  // Clamp columns
  newCol = Math.max(-COLS, Math.min(COLS, newCol));

  // Block movement into grass decorations (trees, bushes, rocks)
  const targetLane = lanes.find(l => l.index === newRow);
  if (targetLane && targetLane.type === 'grass' && targetLane.decorations) {
    const targetX = newCol * CELL_SIZE;
    for (const dec of targetLane.decorations) {
      if (Math.abs(dec.x - targetX) < 0.9) {
        // Blocked — don't move
        return;
      }
    }
  }

  hopStartPos.copy(playerCurrentPos);
  playerRow = newRow;
  playerCol = newCol;
  playerTargetPos.set(playerCol * CELL_SIZE, 0, -playerRow * LANE_WIDTH);
  hopProgress = 0;
  animating = true;
  sndHop();

  // Face direction — beak is at +Z local.
  // World: forward = -Z (row increases = z decreases). 
  // To face -Z world from +Z local: rotation.y = PI
  // To face +Z world (back): rotation.y = 0
  // To face -X world (left): rotation.y = PI/2
  // To face +X world (right): rotation.y = -PI/2
  if (dir === 'forward') player.rotation.y = Math.PI;
  else if (dir === 'back') player.rotation.y = 0;
  else if (dir === 'left') player.rotation.y = -Math.PI / 2;
  else if (dir === 'right') player.rotation.y = Math.PI / 2;

  // Update score
  if (playerRow > maxRow) {
    maxRow = playerRow;
    score = maxRow;
    document.getElementById('score-display').textContent = score;
    if (score > 0 && score % 10 === 0) sndHighScore();
  }

  // Extend world
  if (playerRow + VISIBLE_LANES > lanes[lanes.length - 1].index + 1) {
    buildLane(lanes[lanes.length - 1].index + 1);
  }

  // Reset eagle timer
  eagleTimer = 0;
  eagleActive = false;
  document.getElementById('eagle-warning').style.display = 'none';
}

// ─────────────────────────────────────────────
// DEATH
// ─────────────────────────────────────────────
function triggerDeath(cause) {
  if (deathAnimating || !gameRunning) return;
  gameRunning = false;
  deathAnimating = true;

  // Clean up eagle immediately on any death
  document.getElementById('eagle-warning').style.display = 'none';
  if (eagleMesh) { scene.remove(eagleMesh); eagleMesh = null; }
  eagleTimer = 0; eagleActive = false;
  sndTrainRumbleStop();

  // Play cause-specific death sound
  if (cause === 'water') sndSplash();
  else if (cause === 'eagle') sndEagleScreech();
  else sndSquish();

  // Death animation — squish
  let t = 0;
  const deathAnim = setInterval(() => {
    t += 0.05;
    if (player) {
      player.scale.y = Math.max(0.05, 1 - t * 2);
      player.scale.x = 1 + t;
      player.scale.z = 1 + t;
      player.position.y = 0;
    }
    if (t >= 0.5) {
      clearInterval(deathAnim);
      setTimeout(showDeathScreen, 400);
    }
  }, 16);
}

function showDeathScreen() {
  deathAnimating = false;
  const isNewBest = score > bestScore;
  if (isNewBest) bestScore = score;
  document.getElementById('final-score').textContent = 'Score: ' + score;
  document.getElementById('best-score').textContent = 'Best: ' + bestScore;
  document.getElementById('death-screen').style.display = 'flex';
  if (isNewBest && score > 0) sndHighScore();
}

// ─────────────────────────────────────────────
// COLLISION DETECTION
// ─────────────────────────────────────────────
function checkCollisions() {
  if (!gameRunning || deathAnimating) return;

  // Use target position when just landed (animating just finished) for accuracy
  const px = playerCurrentPos.x;
  const currentLane = lanes.find(l => l.index === playerRow);
  if (!currentLane) return;

  if (currentLane.type === 'river') {
    onLog = false;
    logVelocityX = 0;
    currentLane.obstacles.forEach(o => {
      if (o.type === 'log') {
        // Use a generous hitbox — log moves while player lands so add buffer
        const halfW = o.width / 2 + 0.5;
        if (Math.abs(px - o.mesh.position.x) < halfW) {
          onLog = true;
          logVelocityX = currentLane.direction * currentLane.speed * (1 + score * 0.012) * 0.016;
        }
      }
    });
    if (!onLog) {
      triggerDeath('water');
    }
    return;
  }

  // Not on river — ensure log state is cleared
  onLog = false;
  logVelocityX = 0;

  if (currentLane.type === 'road') {
    currentLane.obstacles.forEach(o => {
      if (o.type === 'car') {
        const halfW = o.width / 2 - 0.2;
        if (Math.abs(px - o.mesh.position.x) < halfW) triggerDeath('car');
      }
    });
  }
}

// ─────────────────────────────────────────────
// COIN COLLECTION
// ─────────────────────────────────────────────
function checkCoins() {
  if (!gameRunning) return;
  lanes.forEach(l => {
    l.coins.forEach(c => {
      if (!c.collected && Math.abs(playerCurrentPos.x - c.x) < 0.8 && l.index === playerRow) {
        c.collected = true;
        scene.remove(c.mesh);
        coins++;
        document.getElementById('coin-count').textContent = coins;
        sndCoin();
      }
    });
  });
}

// ─────────────────────────────────────────────
// CAMERA FOLLOW
// ─────────────────────────────────────────────
const camTarget = new THREE.Vector3(0, 14, 16);
const camLookAt = new THREE.Vector3(0, 0, 0);

function updateCamera() {
  const desiredZ = -playerRow * LANE_WIDTH + 16;
  const desiredX = playerCurrentPos.x * 0.25;
  const desiredLookZ = -playerRow * LANE_WIDTH + 2;

  // Smooth lerp — 0.06 gives nice fluid follow
  camTarget.x += (desiredX - camTarget.x) * 0.06;
  camTarget.z += (desiredZ - camTarget.z) * 0.06;
  camTarget.y = 14;

  camLookAt.x += (desiredX - camLookAt.x) * 0.06;
  camLookAt.z += (desiredLookZ - camLookAt.z) * 0.06;
  camLookAt.y = 0;

  camera.position.copy(camTarget);
  camera.lookAt(camLookAt);
}

// ─────────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────────
let lastTime = 0;
let coinRotation = 0;

function animate(time) {
  requestAnimationFrame(animate);
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  coinRotation += dt * 2;

  if (gameRunning || deathAnimating) {

    // Hop animation
    if (animating && hopProgress < 1) {
      hopProgress = Math.min(hopProgress + dt / HOP_DURATION, 1);
      const t = hopProgress;
      const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
      playerCurrentPos.lerpVectors(hopStartPos, playerTargetPos, ease);
      playerCurrentPos.y = Math.sin(t * Math.PI) * hopMidHeight;

      // Log drift during hop
      if (onLog) {
        playerCurrentPos.x += logVelocityX;
        playerTargetPos.x += logVelocityX;
        hopStartPos.x += logVelocityX;
      }

      if (hopProgress >= 1) {
        animating = false;
        playerCurrentPos.copy(playerTargetPos);
        playerCurrentPos.y = 0;
        sndLand();
        checkCollisions();
        checkCoins();
      }
    }

    // Log drift when standing
    if (!animating && onLog) {
      playerCurrentPos.x += logVelocityX;
      playerTargetPos.x += logVelocityX;
      playerCol = Math.round(playerCurrentPos.x / CELL_SIZE);

      // Fell off edge of screen
      if (Math.abs(playerCurrentPos.x) > COLS * CELL_SIZE + 1) {
        triggerDeath('water');
      }
    }

    if (player) player.position.copy(playerCurrentPos);

    // Move obstacles
    if (gameRunning) {
      // Gradually increase speed with score — very subtle early, more noticeable later
      const speedMult = 1 + score * 0.012;

      lanes.forEach(lane => {
        if (lane.type === 'road') {
          lane.obstacles.forEach(o => {
            o.mesh.position.x += lane.direction * lane.speed * speedMult * dt;
            if (o.mesh.position.x > COLS * CELL_SIZE + 5) o.mesh.position.x = -COLS * CELL_SIZE - 5;
            if (o.mesh.position.x < -COLS * CELL_SIZE - 5) o.mesh.position.x = COLS * CELL_SIZE + 5;
            o.x = o.mesh.position.x;
          });
          // Continuous collision check on road lanes the player occupies
          if (lane.index === playerRow && !animating) {
            checkCollisions();
          }
        }

        if (lane.type === 'river') {
          lane.obstacles.forEach(o => {
            o.mesh.position.x += lane.direction * lane.speed * speedMult * dt;
            if (o.mesh.position.x > COLS * CELL_SIZE + 8) o.mesh.position.x = -COLS * CELL_SIZE - 8;
            if (o.mesh.position.x < -COLS * CELL_SIZE - 8) o.mesh.position.x = COLS * CELL_SIZE + 8;
            o.x = o.mesh.position.x;
          });

          // Only check river collision when not mid-hop — prevents false drowning during landing
          if (lane.index === playerRow && !animating) {
            checkCollisions();
          }
        }

        if (lane.type === 'train') {
          if (lane.trainTimer !== undefined) {
            lane.trainTimer -= dt;

            // Flash warning lights 2.5 seconds before train arrives
            if (lane.warnLights) {
              const flashing = lane.trainTimer <= 2.5 && lane.trainTimer > 0 && !lane.trainActive;
              const flashOn = flashing && Math.floor(Date.now() / 200) % 2 === 0;
              lane.warnLights.forEach(bulb => {
                bulb.material.color.setHex(flashOn ? 0xFF0000 : 0x330000);
                bulb.material.emissiveIntensity = flashOn ? 0.9 : 0;
              });
            }

            if (lane.trainTimer <= 0 && !lane.trainActive) {
              lane.trainActive = true;
              lane.trainTimer = 5 + Math.random() * 8;

              // Only play horn if this train lane is visible on screen
              // Camera looks forward from playerRow — visible range ~20 lanes ahead and 5 behind
              const laneRelRow = lane.index - playerRow;
              if (laneRelRow >= -5 && laneRelRow <= 22) {
                const dist = Math.abs(laneRelRow);
                const hornVol = Math.max(0.08, 0.6 - dist * 0.07);
                sndTrainHorn(hornVol);
              }

              // Reset to off-screen start
              const trainLen = lane.trainLen || 22;
              lane.obstacles.forEach(o => {
                o.mesh.position.x = lane.direction > 0
                  ? -(COLS * CELL_SIZE + trainLen)
                  :  (COLS * CELL_SIZE + trainLen);
                o.x = o.mesh.position.x;
              });

              // Turn off lights
              if (lane.warnLights) {
                lane.warnLights.forEach(bulb => {
                  bulb.material.color.setHex(0x330000);
                  bulb.material.emissiveIntensity = 0;
                });
              }

              // Sync adjacent train lane — fire at same time
              if (lane.syncWith !== undefined) {
                const syncLane = lanes.find(l => l.index === lane.syncWith);
                if (syncLane && syncLane.type === 'train' && !syncLane.trainActive) {
                  syncLane.trainActive = true;
                  syncLane.trainTimer = lane.trainTimer;
                  const syncLen = syncLane.trainLen || 22;
                  syncLane.obstacles.forEach(o => {
                    o.mesh.position.x = syncLane.direction > 0
                      ? -(COLS * CELL_SIZE + syncLen)
                      :  (COLS * CELL_SIZE + syncLen);
                    o.x = o.mesh.position.x;
                  });
                }
              }
            }
          }

          if (lane.trainActive) {
            const trainLen = lane.trainLen || 22;
            lane.obstacles.forEach(o => {
              const prevX = o.mesh.position.x;
              o.mesh.position.x += lane.direction * lane.speed * speedMult * dt;
              o.x = o.mesh.position.x;

              // Sweep collision: check if train body passed through player X this frame
              if (lane.index === playerRow && !animating && gameRunning) {
                const center = o.mesh.position.x + lane.direction * (trainLen / 2);
                const prevCenter = prevX + lane.direction * (trainLen / 2);
                const halfHit = trainLen * 0.38;
                const px = playerCurrentPos.x;
                // Check both current and previous center to catch fast sweeps
                if (Math.abs(px - center) < halfHit || Math.abs(px - prevCenter) < halfHit) {
                  triggerDeath('car');
                }
              }

              // Only deactivate after fully clear — don't deactivate if near player
              const safeToDeactivate = Math.abs(lane.index - playerRow) > 1 || !gameRunning ||
                (lane.direction > 0 ? o.mesh.position.x > COLS * CELL_SIZE + trainLen + 10
                                    : o.mesh.position.x < -(COLS * CELL_SIZE + trainLen + 10));
              if (safeToDeactivate) {
                if (lane.direction > 0 && o.mesh.position.x > COLS * CELL_SIZE + trainLen + 2) {
                  lane.trainActive = false;
                }
                if (lane.direction < 0 && o.mesh.position.x < -(COLS * CELL_SIZE + trainLen + 2)) {
                  lane.trainActive = false;
                }
              }
            });
            if (lane.index === playerRow) {
              sndTrainRumbleStart();
            }
          }
          // Stop rumble if no active train near player
          if (!lane.trainActive && lane.index === playerRow) {
            sndTrainRumbleStop();
          }
        }
      });

      // Eagle timer — disabled while on a log
      if (!onLog) {
        eagleTimer += dt;
        if (eagleTimer > 4 && !eagleActive) {
          document.getElementById('eagle-warning').style.display = 'block';
          eagleActive = true;
          sndEagleSwoop();
        }
        if (eagleTimer > 6) {
          // Eagle swoops down
          if (!eagleMesh) {
            eagleMesh = makeEagle();
            eagleMesh.scale.set(1.5, 1.5, 1.5);
            eagleMesh.position.set(playerCurrentPos.x, 12, playerCurrentPos.z);
            scene.add(eagleMesh);
          }
          const swoopT = eagleTimer - 6;
          eagleMesh.position.set(playerCurrentPos.x, Math.max(0, 12 - swoopT * 10), playerCurrentPos.z);
          if (eagleTimer > 7.2) {
            document.getElementById('eagle-warning').style.display = 'none';
            if (eagleMesh) { scene.remove(eagleMesh); eagleMesh = null; }
            eagleTimer = 0;
            eagleActive = false;
            triggerDeath('eagle');
          }
        }
      } else {
        // On a log — reset eagle, hide warning
        eagleTimer = 0;
        eagleActive = false;
        document.getElementById('eagle-warning').style.display = 'none';
        if (eagleMesh) { scene.remove(eagleMesh); eagleMesh = null; }
      }
    }

    // Rotate coins
    lanes.forEach(l => {
      l.coins.forEach(c => {
        if (!c.collected) c.mesh.rotation.y = coinRotation;
      });
    });

    updateCamera();
    sun.position.set(camera.position.x + 10, 20, camera.position.z - 10);
  }

  renderer.render(scene, camera);
}

// Build a Minecraft-style voxel character from the skin texture
function makeMCSkinCharacter(skinImg) {
  const g = group();
  const px = 0.13; // 1 MC skin pixel = this many world units

  // Sample a region from the skin image onto a new canvas, return a Three.js texture
  function faceTexture(u, v, w, h) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(skinImg, u, v, w, h, 0, 0, w, h);
    const t = new THREE.CanvasTexture(c);
    t.magFilter = THREE.NearestFilter;
    t.minFilter = THREE.NearestFilter;
    return t;
  }

  function mat(u, v, w, h) {
    return new THREE.MeshLambertMaterial({ map: faceTexture(u,v,w,h), transparent: true, alphaTest: 0.1 });
  }

  // Build a box with 6 individual face materials
  // Face order for Three.js BoxGeometry: +X(right), -X(left), +Y(top), -Y(bot), +Z(front), -Z(back)
  function skinPart(bw, bh, bd, mats6) {
    const geo = new THREE.BoxGeometry(bw, bh, bd);
    return new THREE.Mesh(geo, mats6);
  }

  // Skin layout (64x64):
  // Head:  face=8,8 8x8 | top=8,0 | bot=16,0 | right=0,8 | left=16,8 | back=24,8
  // Body:  face=20,20 8x12 | top=20,16 8x4 | bot=28,16 8x4 | right=16,20 4x12 | left=28,20 4x12 | back=32,20 8x12
  // RArm:  face=44,20 4x12 | top=44,16 4x4 | bot=48,16 4x4 | right=40,20 4x12 | left=48,20 4x12 | back=52,20 4x12
  // LLeg:  face=4,20 4x12  | top=4,16 4x4  | bot=8,16 4x4  | right=0,20 4x12  | left=8,20 4x12  | back=12,20 4x12

  // HEAD
  // Three.js BoxGeometry face order: +X, -X, +Y, -Y, +Z, -Z
  // Character faces +Z. So: +X = char's left side, -X = char's right side
  const head = skinPart(8*px, 8*px, 8*px, [
    mat(16,8,8,8),  // +X = character's LEFT side
    mat(0,8,8,8),   // -X = character's RIGHT side
    mat(8,0,8,8),   // +Y top
    mat(16,0,8,8),  // -Y bottom
    mat(8,8,8,8),   // +Z front (face)
    mat(24,8,8,8),  // -Z back
  ]);
  head.position.set(0, (12+12+4)*px, 0);
  g.add(head);

  // BODY — confirmed from skin grid
  const body = skinPart(8*px, 12*px, 4*px, [
    mat(28,20,4,12), // +X = char's left
    mat(16,20,4,12), // -X = char's right
    mat(20,16,8,4),  // +Y top
    mat(28,16,8,4),  // -Y bottom
    mat(20,20,8,12), // +Z front
    mat(32,20,8,12), // -Z back
  ]);
  body.position.set(0, (12+6)*px, 0);
  g.add(body);

  // RIGHT ARM
  const armR = skinPart(4*px, 12*px, 4*px, [
    mat(48,20,4,12), // +X = char's left (inner)
    mat(40,20,4,12), // -X = char's right (outer)
    mat(44,16,4,4),  // +Y top
    mat(48,16,4,4),  // -Y bottom
    mat(44,20,4,12), // +Z front
    mat(52,20,4,12), // -Z back
  ]);
  armR.position.set((8*px/2 + 4*px/2), (12+6)*px, 0);
  g.add(armR);

  // LEFT ARM
  const armL = skinPart(4*px, 12*px, 4*px, [
    mat(40,20,4,12), // +X = char's left (outer)
    mat(48,20,4,12), // -X = char's right (inner)
    mat(44,16,4,4),  // +Y top
    mat(48,16,4,4),  // -Y bottom
    mat(44,20,4,12), // +Z front
    mat(52,20,4,12), // -Z back
  ]);
  armL.position.set(-(8*px/2 + 4*px/2), (12+6)*px, 0);
  g.add(armL);

  // LEFT LEG
  const legL = skinPart(4*px, 12*px, 4*px, [
    mat(8,20,4,12),  // +X = char's left
    mat(0,20,4,12),  // -X = char's right
    mat(4,16,4,4),   // +Y top
    mat(8,16,4,4),   // -Y bottom
    mat(4,20,4,12),  // +Z front
    mat(12,20,4,12), // -Z back
  ]);
  legL.position.set(-2*px, 6*px, 0);
  g.add(legL);

  // RIGHT LEG
  const legR = skinPart(4*px, 12*px, 4*px, [
    mat(0,20,4,12),  // +X = char's left
    mat(8,20,4,12),  // -X = char's right
    mat(4,16,4,4),   // +Y top
    mat(8,16,4,4),   // -Y bottom
    mat(4,20,4,12),  // +Z front
    mat(12,20,4,12), // -Z back
  ]);
  legR.position.set(2*px, 6*px, 0);
  g.add(legR);

  return g;
}

function activateMCSkin() {
  if (jActive) return;
  jActive = true;

  // Load skin as an Image element so canvas can drawImage from it
  const img = new Image();
  img.onload = () => {
    lanes.forEach(lane => {
      if (lane.type !== 'grass') return;
      lane.tile.children.forEach(child => {
        if (!child.userData.isTree) return;
        while (child.children.length) child.remove(child.children[0]);
        const mc = makeMCSkinCharacter(img);
        mc.position.set(0, 0, 0);
        child.add(mc);
        child.userData.isTree = false;
      });
    });
  };
  img.src = 'data:image/jpeg;base64,' + SKIN_B64;
}

document.addEventListener('keydown', e => {
  if (e.key === 'j') {
    jSequence.push('j');
    if (jSequence.length > J_CODE.length) jSequence.shift();
    if (jSequence.join('') === 'jjj') activateMCSkin();
  } else {
    jSequence = [];
  }
});

// ─────────────────────────────────────────────
// ISHAAN EASTER EGG — press i i i i o
// ─────────────────────────────────────────────
let ishaanSequence = [];
let ishaanActive = false;
const ISHAAN_CODE = ['i','i','i','i','o'];

function makeIshaanTexture() {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#CC0000';
  ctx.fillRect(0, 0, 512, 256);
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 90px Arial Black, Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('ISHAAN', 256, 128);
  return new THREE.CanvasTexture(c);
}

function activateIshaan() {
  if (ishaanActive) return;
  ishaanActive = true;

  lanes.forEach(lane => {
    if (lane.type !== 'road' && lane.type !== 'train') return;
    lane.obstacles.forEach(o => {
      if (lane.type === 'road') applyIshaanToCar(o.mesh);
      else if (lane.type === 'train') applyIshaanToTrain(o.mesh);
    });
  });
}

function applyIshaanToCar(mesh) {
  const redMat = new THREE.MeshLambertMaterial({ color: 0xCC0000 });
  const ishaanTex = makeIshaanTexture();
  const decalMat = new THREE.MeshLambertMaterial({ map: ishaanTex, side: THREE.DoubleSide });

  mesh.traverse(child => {
    if (child.isMesh && child.userData.isBody) child.material = redMat;
  });

  // Remove any existing decals first to avoid duplicates
  const toRemove = [];
  mesh.traverse(child => { if (child.userData.ishaanDecal) toRemove.push(child); });
  toRemove.forEach(c => c.parent.remove(c));

  [0.81, -0.81].forEach(xOff => {
    const geo = new THREE.PlaneGeometry(2.8, 0.5);
    const decal = new THREE.Mesh(geo, decalMat);
    decal.position.set(xOff, 0.55, 0);
    decal.rotation.y = xOff > 0 ? Math.PI / 2 : -Math.PI / 2;
    decal.userData.ishaanDecal = true;
    mesh.add(decal);
  });
}

function applyIshaanToTrain(mesh) {
  const blackMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
  const ishaanTex = makeIshaanTexture();
  const decalMat = new THREE.MeshLambertMaterial({ map: ishaanTex, side: THREE.DoubleSide });

  mesh.traverse(child => {
    if (child.isMesh && child.userData.isBody) child.material = blackMat;
  });

  // Add decals to each car group (direct children of train group)
  mesh.children.forEach(carGroup => {
    if (!carGroup.isGroup) return;
    const toRemove = [];
    carGroup.traverse(c => { if (c.userData.ishaanDecal) toRemove.push(c); });
    toRemove.forEach(c => c.parent.remove(c));

    [0.92, -0.92].forEach(xOff => {
      const geo = new THREE.PlaneGeometry(3.2, 0.55);
      const decal = new THREE.Mesh(geo, decalMat);
      decal.position.set(xOff, 0.9, 0);
      decal.rotation.y = xOff > 0 ? Math.PI / 2 : -Math.PI / 2;
      decal.userData.ishaanDecal = true;
      carGroup.add(decal);
    });
  });
}

// ─────────────────────────────────────────────
// BOSNIA EASTER EGG — press r r r
// ─────────────────────────────────────────────
let rSequence = [];
let bosniaActive = false;

function activateBosnia() {
  if (bosniaActive) return;
  bosniaActive = true;
  // Bosnia flag: blue #002F6C, yellow #FFCD00, white #FFFFFF
  mats.chickBody.color.setHex(0x002F6C);
  mats.chickWing.color.setHex(0x002F6C);
  mats.chickBeak.color.setHex(0xFFCD00);
  mats.chickFoot.color.setHex(0xFFCD00);
  mats.chickComb.color.setHex(0xFFCD00);
  mats.chickEye.color.setHex(0xFFFFFF);
}

document.addEventListener('keydown', e => {
  if (e.key === 'r') {
    rSequence.push('r');
    if (rSequence.length > 3) rSequence.shift();
    if (rSequence.join('') === 'rrr') activateBosnia();
  } else {
    rSequence = [];
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'i' || e.key === 'o') {
    ishaanSequence.push(e.key);
    if (ishaanSequence.length > ISHAAN_CODE.length) {
      ishaanSequence.shift();
    }
    if (ishaanSequence.join('') === ISHAAN_CODE.join('')) {
      activateIshaan();
    }
  } else {
    ishaanSequence = [];
  }
});

// ─────────────────────────────────────────────
// FLAG EASTER EGGS — type usa / mex / can
// ─────────────────────────────────────────────
let flagBuffer = '';

function applyFlag(body, wing, beak, foot, comb, eye) {
  mats.chickBody.color.setHex(body);
  mats.chickWing.color.setHex(wing);
  mats.chickBeak.color.setHex(beak);
  mats.chickFoot.color.setHex(foot);
  mats.chickComb.color.setHex(comb);
  mats.chickEye.color.setHex(eye);
}

document.addEventListener('keydown', e => {
  if (!gameRunning) return;
  const k = e.key.toLowerCase();
  if ('usamexico can'.includes(k) && k.length === 1) {
    flagBuffer = (flagBuffer + k).slice(-3);
    if (flagBuffer === 'usa') {
      // USA: red body, white wing, blue beak/foot, red comb, white eye
      applyFlag(0xB22234, 0xFFFFFF, 0x3C3B6E, 0x3C3B6E, 0xB22234, 0xFFFFFF);
    } else if (flagBuffer === 'mex') {
      // Mexico: green body, white wing, red beak/comb/foot, black eye
      applyFlag(0x006847, 0xFFFFFF, 0xCE1126, 0xCE1126, 0xCE1126, 0x111111);
    } else if (flagBuffer === 'can') {
      // Canada: red body, white wing, red beak/comb/foot, white eye
      applyFlag(0xFF0000, 0xFFFFFF, 0xFF0000, 0xFF0000, 0xFF0000, 0xFFFFFF);
    }
  } else {
    flagBuffer = '';
  }
});
window.addEventListener('load', () => {
  const { w, h } = getContainerSize();
  renderer.setSize(w, h);
});
animate(0);
</script>
